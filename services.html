<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicios | IVIA Studio</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="services.css">
</head>
<body>

  <main class="page services-page">

    <!-- Header -->
    <header class="services-header">
      <a href="index.html" class="back-btn">
        <i class="fa-solid fa-chevron-left"></i>
      </a>
      <div class="services-title-block">
        <h1 class="services-title">Servicios</h1>
        <span class="services-sub">Beauty Lounge</span>
      </div>
      <div class="back-placeholder"></div>
    </header>

    <!-- Lista de servicios -->
    <div class="services-list" id="servicesList">

      <div class="service-category">
        <span class="category-label">Categoría</span>
        <div class="service-item">
          <div class="service-info">
            <span class="service-name">Nombre del servicio</span>
            <span class="service-desc">Descripción breve del servicio</span>
          </div>
          <span class="service-price">$00</span>
        </div>
        <div class="service-item">
          <div class="service-info">
            <span class="service-name">Nombre del servicio</span>
            <span class="service-desc">Descripción breve del servicio</span>
          </div>
          <span class="service-price">$00</span>
        </div>
      </div>

      <div class="service-category">
        <span class="category-label">Categoría</span>
        <div class="service-item">
          <div class="service-info">
            <span class="service-name">Nombre del servicio</span>
            <span class="service-desc">Descripción breve del servicio</span>
          </div>
          <span class="service-price">$00</span>
        </div>
      </div>

    </div>

  </main>

  <!-- Bottom navigation (componente reutilizable) -->
  <div id="bottom-nav-placeholder"></div>

  <script src="script.js"></script>
  <script>
    // Marcar "info" como activo al cargar
    document.addEventListener('navLoaded', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector('[data-nav="info"]')?.classList.add('active');
    });
  </script>

</body>
</html>
