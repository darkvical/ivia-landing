<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Servicios de pies en IVIA Studio — Pedicure Clásica, Gel y Acripie.">
  <title>Pies | IVIA Studio</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;0,6..96,500;0,6..96,600;1,6..96,300;1,6..96,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="services.css">
</head>
<body data-active-nav="info">

  <main class="page services-page">

    <img class="services-logo" src="assets/logo.png" alt="IVIA Studio Beauty Lounge">

    <header class="services-header">
      <a href="services.html" class="back-btn" aria-label="Volver a servicios">
        <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
      </a>
      <div class="services-title-block">
        <h1 class="services-title">Pies</h1>
      </div>
      <div class="back-placeholder" aria-hidden="true"></div>
    </header>

    <div class="services-list">

      <div class="service-item" data-service="Pedicure Clásica" role="button" tabindex="0" aria-label="Consultar sobre Pedicure Clásica por WhatsApp">
        <div class="service-info">
          <span class="service-name">Pedicure Clásica</span>
          <span class="service-desc">Limpieza, limado, cutícula y esmaltado tradicional para pies cuidados y suaves.</span>
        </div>
        <span class="service-wa" aria-hidden="true"><i class="fa-brands fa-whatsapp"></i></span>
      </div>

      <div class="service-item" data-service="Pedicure Gel" role="button" tabindex="0" aria-label="Consultar sobre Pedicure Gel por WhatsApp">
        <div class="service-info">
          <span class="service-name">Pedicure Gel</span>
          <span class="service-desc">Esmaltado semipermanente en gel para pies con mayor resistencia y duración prolongada.</span>
        </div>
        <span class="service-wa" aria-hidden="true"><i class="fa-brands fa-whatsapp"></i></span>
      </div>

      <div class="service-item" data-service="Acripie" role="button" tabindex="0" aria-label="Consultar sobre Acripie por WhatsApp">
        <div class="service-info">
          <span class="service-name">Acripie</span>
          <span class="service-desc">Extensión acrílica para uñas de pies, ideal para reconstruir o dar forma al pie.</span>
        </div>
        <span class="service-wa" aria-hidden="true"><i class="fa-brands fa-whatsapp"></i></span>
      </div>

    </div>

  </main>

  <div id="bottom-nav-placeholder"></div>

  <script src="script.js"></script>

</body>
</html>
