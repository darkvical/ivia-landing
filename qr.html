<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR | IVIA Studio</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;0,6..96,500;0,6..96,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --coral:      #e69082;
      --beige:      #f2e1d4;
      --copper:     #c4a77d;
      --bg:         #0a0805;
      --font-serif: 'Bodoni Moda', serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: var(--font-serif);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 24px;
    }

    /* ── Tarjeta QR ─────────────────────────────────────────── */
    .qr-card {
      background: #131008;
      border: 1px solid rgba(196,167,125,0.25);
      border-radius: 28px;
      padding: 52px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* ── Logo superior ──────────────────────────────────────── */
    .card-logo {
      width: 240px;
      height: auto;
      display: block;
    }

    /* ── Divisor ────────────────────────────────────────────── */
    .card-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--copper), transparent);
      opacity: 0.4;
    }

    /* ── Wrapper QR con logo centrado ───────────────────────── */
    .qr-wrapper {
      position: relative;
      display: inline-block;
      border-radius: 16px;
      overflow: hidden;
      padding: 14px;
      background: var(--beige);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
      border-radius: 6px;
    }


    /* ── Texto inferior ─────────────────────────────────────── */
    .card-text {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-cta {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 4px;
      color: var(--beige);
      text-transform: uppercase;
    }

    .card-url {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 1.5px;
      color: var(--copper);
      opacity: 0.7;
    }

    /* ── Botón imprimir ─────────────────────────────────────── */
    .print-btn {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 50px;
      background: var(--coral);
      color: rgba(0,0,0,0.8);
      font-family: var(--font-serif);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 6px 20px rgba(230,144,130,0.35);
    }
    .print-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(230,144,130,0.45);
      filter: brightness(1.06);
    }
    .print-btn:active { transform: scale(0.97); }

    /* ── Estilos de impresión ───────────────────────────────── */
    @media print {
      body {
        background: #fff;
        padding: 0;
        justify-content: flex-start;
      }
      .qr-card {
        background: #fff;
        border: none;
        box-shadow: none;
        margin: 0 auto;
        padding: 20px;
      }
      .card-logo {
        /* Invierte el logo para fondo blanco en impresión */
        filter: invert(1) brightness(0.25);
      }
      .card-divider { opacity: 0.2; }
      .qr-wrapper {
        background: #fff;
        box-shadow: none;
        padding: 0;
      }
      .qr-logo-overlay { background: #fff; }
      .card-cta { color: #1a1410; }
      .card-url  { color: #888; opacity: 1; }
      .print-btn { display: none; }
    }
  </style>
</head>
<body>

  <div class="qr-card" id="printArea">

    <img class="card-logo" src="assets/logo.png" alt="IVIA Studio Beauty Lounge">

    <div class="card-divider"></div>

    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>

    <div class="card-text">
      <span class="card-cta">Escanéame</span>
      <span class="card-url" id="urlDisplay"></span>
    </div>

  </div>

  <button class="print-btn" onclick="window.print()">
    <i class="fa-solid fa-print" aria-hidden="true"></i>
    Imprimir QR
  </button>

  <script>
    // ← Cambia esta URL por la URL real de tu sitio una vez desplegado
    const LANDING_URL = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
      ? 'https://iviastudio.pe' // reemplaza con tu dominio
      : window.location.origin;

    document.getElementById('urlDisplay').textContent = LANDING_URL;

    new QRCode(document.getElementById('qrcode'), {
      text: LANDING_URL,
      width: 320,
      height: 320,
      colorDark: '#1a1208',
      colorLight: '#f2e1d4',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
