<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago | IVIA Studio</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;0,6..96,500;0,6..96,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral:      #e69082;
      --beige:      #f2e1d4;
      --copper:     #c4a77d;
      --bg:         #0a0805;
      --font-serif: 'Bodoni Moda', serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      height: 100dvh;
      overflow: hidden;
      font-family: var(--font-serif);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(12px, 3vw, 32px);
    }

    .qr-card {
      background: #131008;
      border: 1px solid rgba(196,167,125,0.25);
      border-radius: clamp(16px, 3vw, 28px);
      padding: clamp(20px, 4vh, 48px) clamp(20px, 4vw, 48px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(12px, 2.5vh, 28px);
      width: 100%;
      max-width: min(480px, 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .card-logo {
      width: clamp(100px, 30vw, 200px);
      height: auto;
      display: block;
    }

    .card-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--copper), transparent);
      opacity: 0.4;
    }

    .qr-wrapper {
      border-radius: clamp(10px, 2vw, 16px);
      overflow: hidden;
      padding: clamp(10px, 2vw, 16px);
      background: var(--beige);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .qr-img {
      display: block;
      width: clamp(160px, 45vw, 260px);
      height: clamp(160px, 45vw, 260px);
      object-fit: contain;
    }

    .card-text {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-cta {
      font-size: clamp(12px, 3vw, 17px);
      font-weight: 500;
      letter-spacing: 4px;
      color: var(--beige);
      text-transform: uppercase;
    }

    .card-sub {
      font-size: clamp(9px, 2vw, 12px);
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--copper);
      opacity: 0.75;
      text-transform: uppercase;
    }

    @media print {
      body       { background: #fff; height: auto; overflow: visible; padding: 0; }
      .qr-card   { background: #fff; border: none; box-shadow: none; margin: 0 auto; }
      .card-logo { filter: invert(1) brightness(0.25); }
      .card-divider { opacity: 0.2; }
      .qr-wrapper   { background: #fff; box-shadow: none; padding: 0; }
      .card-cta  { color: #1a1410; }
      .card-sub  { color: #888; opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="qr-card">
    <img class="card-logo" src="assets/logo.png" alt="IVIA Studio Beauty Lounge">
    <div class="card-divider"></div>
    <div class="qr-wrapper">
      <img class="qr-img" src="assets/qr_payment.png" alt="QR de pago IVIA Studio">
    </div>
    <div class="card-text">
      <span class="card-cta">Paga con QR</span>
      <span class="card-sub">Escanea con tu app bancaria</span>
    </div>
  </div>

</body>
</html>
