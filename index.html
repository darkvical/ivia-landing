<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IVIA Studio | Beauty Lounge</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Dot rail decoration -->
  <div class="dots-rail" id="dotsRail"></div>

  <main class="page">

    <!-- Logo -->
    <div class="logo-section">
      <img class="logo-img" src="assets/logo.png" alt="IVIA Studio Beauty Lounge">
    </div>

    <!-- Social grid -->
    <div class="grid">
      <a class="btn btn-whatsapp" href="https://wa.me/message/GSKIYJBAVJV3H1" target="_blank">
        <span class="btn-icon"><i class="fa-brands fa-whatsapp"></i></span>
        <span class="btn-label">WhatsApp</span>
        <span class="btn-arrow"><i class="fa-solid fa-up-right-from-square"></i></span>
      </a>
      <a class="btn btn-instagram" href="https://www.instagram.com/ivia.studio/" target="_blank">
        <span class="btn-icon"><i class="fa-brands fa-instagram"></i></span>
        <span class="btn-label">Instagram</span>
        <span class="btn-arrow"><i class="fa-solid fa-up-right-from-square"></i></span>
      </a>
      <a class="btn btn-facebook" href="https://www.facebook.com/ivia.studio" target="_blank">
        <span class="btn-icon"><i class="fa-brands fa-facebook-f"></i></span>
        <span class="btn-label">Facebook</span>
        <span class="btn-arrow"><i class="fa-solid fa-up-right-from-square"></i></span>
      </a>
      <a class="btn btn-tiktok" href="https://www.tiktok.com/@ivia.studio" target="_blank">
        <span class="btn-icon"><i class="fa-brands fa-tiktok"></i></span>
        <span class="btn-label">TikTok</span>
        <span class="btn-arrow"><i class="fa-solid fa-up-right-from-square"></i></span>
      </a>
    </div>

    <!-- Book Appointment -->
    <a class="btn appointment" href="https://www.fresha.com/p/ivia-beauty-lounge-6213278?share=true&pId=2810015" target="_blank">
      <span class="btn-icon" style="font-size:20px; width:26px;"><i class="fa-regular fa-calendar"></i></span>
      <div class="appt-text">
        <span class="appt-title">Reservar cita</span>
        <span class="appt-sub">Reservado para los distinguidos</span>
      </div>
      <span class="btn-arrow" style="font-size:17px;"><i class="fa-solid fa-up-right-from-square"></i></span>
    </a>

  </main>

  <!-- Bottom navigation (componente reutilizable) -->
  <div id="bottom-nav-placeholder"></div>

  <script src="script.js"></script>

</body>
</html>
